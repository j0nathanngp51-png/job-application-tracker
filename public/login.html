<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In — Job Application Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body
    class="bg-slate-50 dark:bg-slate-950 min-h-screen flex items-center justify-center px-4"
  >
    <div class="w-full max-w-sm">
      <h1
        class="text-2xl font-semibold text-slate-900 dark:text-white text-center mb-1"
      >
        Job Application Tracker
      </h1>
      <p
        class="text-sm text-slate-500 dark:text-slate-400 text-center mb-6"
        id="form-subtitle"
      >
        Log in to your account
      </p>

      <div
        class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-700 p-6 shadow-sm"
      >
        <form id="auth-form">
          <div class="space-y-4">
            <div>
              <label
                class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1"
                >Username</label
              >
              <input
                type="text"
                id="username"
                required
                class="w-full rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-800 px-3 py-2 text-sm text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
              />
            </div>
            <div>
              <label
                class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1"
                >Password</label
              >
              <input
                type="password"
                id="password"
                required
                class="w-full rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-800 px-3 py-2 text-sm text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
              />
            </div>
          </div>

          <p id="error-msg" class="text-sm text-rose-600 mt-3 hidden"></p>

          <button
            type="submit"
            id="submit-btn"
            class="w-full mt-5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition"
          >
            Log In
          </button>
        </form>

        <p class="text-sm text-center text-slate-500 dark:text-slate-400 mt-4">
          <span id="toggle-text">Don't have an account?</span>
          <button
            id="toggle-mode"
            class="text-indigo-600 font-medium hover:underline"
          >
            Sign up
          </button>
        </p>
      </div>
    </div>

    <script src="js/auth.js"></script>
  </body>
</html>
