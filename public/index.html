<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 dark:bg-slate-950 min-h-screen transition">
    <!-- header: -->

    <header
      class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-10 transition"
    >
      <div
        class="max-w-3xl mx-auto px-6 py-4 flex items-center justify-between"
      >
        <h1 class="text-xl font-semibold text-slate-900 dark:text-white">
          Job Application Tracker
        </h1>
        <div class="flex items-center gap-4">
          <button
            id="theme-toggle"
            class="text-sm font-medium text-slate-500 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white transition"
          >
            🌙 Dark mode
          </button>

          <!-- log out button: -->
          <button
            id="logout-btn"
            class="text-sm font-medium text-slate-500 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white transition"
          >
            Log out
          </button>
        </div>
      </div>
      <!-- // ending div -->
    </header>
    <!-- // ending header -->

    <!-- main: -->

    <main class="max-w-3xl mx-auto px-6 py-8">
      <form
        id="add-form"
        class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-700 p-6 mb-8 shadow-sm transition"
      >
        <input type="hidden" id="csrf_token" value="" />
        <h2 class="text-base font-semibold text-slate-900 dark:text-white mb-4">
          Add an application
        </h2>
        <!-- // company and job title inputs: -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <input
            type="text"
            id="company_name"
            placeholder="Company name"
            required
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 dark:border-slate-600 dark:bg-slate-800 dark:text-white dark:placeholder-slate-500"
          />

          <input
            type="text"
            id="job_title"
            placeholder="Job title"
            required
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 dark:border-slate-600 dark:bg-slate-800 dark:text-white dark:placeholder-slate-500"
          />

          <!-- // menu for status of applications: -->
          <select
            id="status"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 dark:border-slate-600 dark:bg-slate-800 dark:text-white dark:placeholder-slate-500"
          >
            <option value="Applied">Applied</option>
            <option value="Interviewing">Interviewing</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
          </select>

          <!-- the date pof the application and the "URL" of it: -->
          <input
            type="date"
            id="date_applied"
            required
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 dark:border-slate-600 dark:bg-slate-800 dark:text-white dark:placeholder-slate-500"
          />

          <input
            type="url"
            id="job_url"
            placeholder="Job posting URL"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:col-span-2 dark:border-slate-600 dark:bg-slate-800 dark:text-white dark:placeholder-slate-500"
          />

          <textarea
            id="notes"
            placeholder="Notes"
            rows="2"
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:col-span-2 dark:border-slate-600 dark:bg-slate-800 dark:text-white dark:placeholder-slate-500"
          ></textarea>
        </div>

        <!-- // submitting the application: -->

        <button
          type="submit"
          class="mt-4 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition"
        >
          Add application
        </button>
      </form>

      <!-- filtering divider: -->
      <div
        class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4"
      >
        <h2 class="text-base font-semibold text-slate-900 dark:text-white">
          Your applications
        </h2>

        <!-- filter selection menu: -->
        <div class="flex gap-2">
          <input
            type="text"
            id="search-box"
            placeholder="Search by company..."
            class="rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-800 px-3 py-1.5 text-sm text-slate-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
          <select
            id="status-filter"
            class="rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-800 px-3 py-1.5 text-sm text-slate-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500"
          >
            <option value="All">All statuses</option>
            <option value="Applied">Applied</option>
            <option value="Interviewing">Interviewing</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
          </select>
        </div>
      </div>

      <!-- // App List -->
      <div id="app-list" class="space-y-3"></div>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
